name: Blogger Automation with Naver Search

on:
  schedule:
    # 🕒 한국 시간 기준 매일 오전 9시부터 오후 11시까지, 매시간 정각마다 봇이 깨어납니다.
    # (사람이 활동하는 낮 시간대에만 주사위를 굴리도록 범위를 제한했습니다.)
    - cron: '0 0-14 * * *'
  workflow_dispatch: # 수동 실행 버튼도 유지합니다.

concurrency:
  group: blog-automation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium webdriver-manager google-generativeai google-api-python-client google-auth-oauthlib

      - name: Run Script with Random Human Filter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN_PKL: ${{ secrets.BLOGGER_TOKEN_PKL }}
        # 👇 실행할 때 파이썬이 자체적으로 "이번 시간에 글을 쓸지 말지" 사람처럼 불규칙하게 결정합니다.
        run: |
          python -c "
          import random, sys
          # 🎲 15%의 확률로 당첨되면 글을 씁니다. (하루에 보통 1~2번 랜덤으로 당첨됨)
          if random.random() > 0.15:
              print('🤫 [Human Filter] 이번 시간은 건너뜁니다. (사람처럼 보이기 위한 랜덤 스킵)')
              sys.exit(0)
          print('🚀 [Human Filter] 당첨! 지금 사람이 글을 쓰는 것처럼 자동화를 시작합니다.')
          " && python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords_queue.txt
          git commit -m "Update keyword queue: Consumed one [skip ci]" || echo "No changes to commit"
          git push
