name: Blogger Auto Posting with Selenium

on:
  schedule:
    - cron: '0 0 * * *' # 매일 정해진 시간에 실행 (원하는 대로 수정 가능)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/set-up-python@v4
      with:
        python-version: '3.10' # 최신 라이브러리 지원을 위해 3.10 권장

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests selenium webdriver-manager

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Auto Posting
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BLOG_ID: ${{ secrets.BLOG_ID }}
        BLOGGER_COOKIES: ${{ secrets.BLOGGER_COOKIES }}
      run: python main.py
