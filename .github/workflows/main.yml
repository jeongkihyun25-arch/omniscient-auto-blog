name: Blogger Automation with Naver Search

on:
  schedule:
    # 🕒 [이틀에 1번 세팅] 홀수 날(1, 3, 5, 7...)마다 한국 시간 오후 2시 정각에 깨어납니다.
    # (UTC 05:00 = KST 14:00)
    - cron: '0 5 1-31/2 * *'
  workflow_dispatch: # 수동 실행 버튼

concurrency:
  group: blog-automation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium webdriver-manager google-generativeai google-api-python-client google-auth-oauthlib

      - name: Run Script with Smart Human Delay
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN_PKL: ${{ secrets.BLOGGER_TOKEN_PKL }}
        # 🔥 주사위 탈락 없이 무조건 100% 실행하되, 실행 시간을 사람처럼 분, 초 단위로 랜덤하게 꼬아서 시작합니다.
        run: |
          python -c "
          import random, time, os
          
          # ⏳ 0초에서 5400초(1시간 반) 사이로 무작위 대기 시간 가동 (사람이 켜는 시간 묘사)
          delay = random.randint(0, 5400)
          min_delay = round(delay / 60, 1)
          
          print(f'🤫 [Human Filter] 기계처럼 정각에 안 올리고, {min_delay}분 동안 커피 한 잔 마시며 대기 후 글을 씁니다...')
          time.sleep(delay)
          
          print('🚀 [Human Filter] 대기 완료! 지금 글 작성을 시작합니다.')
          os.system('python main.py')
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords_queue.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update keyword queue: Consumed one [skip ci]" && git push)
